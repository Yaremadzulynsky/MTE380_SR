services:
  robot:
    build: .
    restart: unless-stopped

    # Host network — Flask binds directly on the Pi's IP, no port mapping needed.
    # Required for Picamera2 which uses libcamera via host IPC sockets.
    network_mode: host

    # Privileged mode gives the container full access to the Pi's hardware
    # buses (CSI camera, GPIO, V4L2).  Required for Picamera2.
    privileged: true

    devices:
      # Arduino Mega — change to /dev/ttyUSB0 if using a USB-serial adapter
      - /dev/ttyACM0:/dev/ttyACM0

    volumes:
      # Picamera2 uses libcamera IPC sockets under /run
      - /run:/run

    environment:
      SERIAL_PORT: /dev/ttyACM0
      CAMERA:      pi
      WEB_PORT:    5000
