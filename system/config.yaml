# Line follow mode
line_follow_mode: 4
reverse_line_follow: false

# Steering PID
steer_kp: 0.08
steer_ki: 0.0
steer_kd: 0.005
steer_out_limit: 1.0

# Heading PID
heading_kp: 0.11
heading_ki: 0.0
heading_kd: 0.005

# Motor PID
motor_kp: 0.008
motor_ki: 0.0008
motor_kd: 0.0

# Speed
base_speed: 0.2
min_speed: 0.0
min_curve_speed: 0.0
max_speed: 1.0

# Approach blue
approach_blue_speed: 0.12
approach_blue_min_r_px: 90.0

# Drive-forward
pre_turn180_backup_m: 0.0
forward_drive_m: 0.22
forward_drive_speed: 0.1
forward_align_thresh: 0.2
align_kp: 0.3

# Turn 180
turn180_degrees: -190.0
turn180_align_thresh: 0.1
turn180_speed: 0.25
turn180_duration_s: 1.0

# Drop-off
green_delay_s: 2.0
dropoff_distance_m: 0.3

# Controllers
wheel_diameter_m: 0.08
wheelbase_m: 0.155
rot_kp: 0.2
rot_ki: 0.3
rot_kd: 0.0
rot_tolerance: 5.0
rot_motor_deadband: 0.0
rot_max_speed: 0.2
pos_kp: 2.0
pos_ki: 1.0
pos_kd: 0.0
pos_tolerance_m: 0.05
pos_motor_deadband: 0.0
pos_max_speed: 0.25

# Claw / servo
claw_open: 180.0
claw_closed: 0.0
pickup_hold_s: 0.8

# Find line
find_line_turn_speed: 0.0
find_line_min_blob_px: 20

# Corner turn
corner_curvature_thresh: 100.0
heading_speed_thresh: 0.4

# Vision / perception
red_loss_debounce_frames: 2
red_error_ema_alpha: 0.35
red_min_area_px: 80
red_mask_min_blob_px: 20
red_circle_max_circularity: 0.7
line_axle_extrap: 0.0
curve_n_strips: 8
error_heading_weight: 0.3
error_curvature_weight: 0.2

# Line detection HSV
red_h_lo: 134
red_h_hi: 179
red_s_min: 121
red_v_min: 63
blue_h_lo: 95
blue_h_hi: 135
blue_s_min: 120
blue_v_min: 70
green_h_lo: 40
green_h_hi: 80
green_s_min: 60
green_v_min: 60

# Camera / runtime
camera_width: 1420
camera_height: 1232
fps: 30.0
roi_top_ratio: 0.0
roi_top_px: 0
camera_rotation_deg: 0.0