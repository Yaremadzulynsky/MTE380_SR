# Line follow mode
line_follow_mode: 4

# Steering PID
steer_kp: 0.05
steer_ki: 0.0
steer_kd: 0.02
steer_out_limit: 1.0

# Heading PID
heading_kp: 0.1
heading_ki: 0.0
heading_kd: 0.0

# Motor PID
motor_kp: 0.004
motor_ki: 0.01
motor_kd: 0.0001

# Speed
base_speed: 0.3
min_speed: 0.16
max_speed: 0.6

# Drive-forward
forward_drive_s: 0.1
forward_drive_speed: 0.1
forward_align_thresh: 0.3
align_kp: 0.5

# Drop-off
green_delay_s: 1.0
dropoff_distance_m: 0.3

# Controllers
wheel_diameter_m: 0.08
wheelbase_m: 0.188
rot_kp: 0.2
rot_ki: 0.05
rot_kd: 0.0
rot_tolerance: 3.0
rot_motor_deadband: 0.35
pos_kp: 0.01
pos_ki: 0.0
pos_kd: 0.005
pos_tolerance_m: 0.01
pos_motor_deadband: 0.3

# Claw / servo
claw_open: 160.0
claw_closed: 0.0
pickup_hold_s: 1.0

# Find line
find_line_turn_speed: 0.15

# Corner turn
corner_curvature_thresh: 0.3

# Vision / perception
red_loss_debounce_frames: 2
red_error_ema_alpha: 0.35
red_min_area_px: 160
line_axle_extrap: 1.0
curve_n_strips: 8
error_heading_weight: 0.0
error_curvature_weight: 0.0

# Line detection HSV
red_h_lo1: 3
red_h_hi1: 30
red_h_lo2: 160
red_h_hi2: 179
red_s_min: 124
red_v_min: 26
blue_h_lo: 105
blue_h_hi: 140
blue_s_min: 141
blue_v_min: 0
green_h_lo: 40
green_h_hi: 137
green_s_min: 150
green_v_min: 60

# Camera / runtime
camera_width: 1420
camera_height: 1232
fps: 120
roi_top_ratio: 0.0
camera_rotation_deg: 0.0