fps: 30.0
roi_y_start_ratio: 0.5
alpha: 0.9
path_mask_key: red
show_masks: true

camera:
  source: webcam
  webcam_index: 0
  width: 640
  height: 480
  backend: auto  # auto | gstreamer | ffmpeg
  # gstreamer_device: /dev/video0  # optional: override device for GStreamer
  # source can also be:
  # - video:/absolute/path/to/file.mp4
  # - stream:udp://0.0.0.0:5000
  # - udp://0.0.0.0:5000

red1:
  lo: [0, 120, 80]
  hi: [10, 255, 255]
red2:
  lo: [170, 120, 80]
  hi: [179, 255, 255]
green:
  lo: [35, 60, 60]
  hi: [85, 255, 255]
blue:
  lo: [95, 80, 80]
  hi: [130, 255, 255]
black:
  lo: [0, 0, 0]
  hi: [179, 255, 80]
danger:
  lo: [0, 0, 0]
  hi: [179, 60, 90]

morph:
  kernel_size: 5
  open_iters: 1
  close_iters: 1

heading:
  min_area: 150.0
  use_centerline: true
  lookahead_y_frac: 0.72
  forward_bias: 1.0
  lateral_gain: 0.5
  max_lateral_abs: 0.6

zones:
  target_min_area: 300.0
  target_min_circularity: 0.6
  danger_mode: either
  danger_ratio_thresh: 0.08
  danger_area_thresh: 4000.0
  path_ratio_thresh: 0.03
  path_area_thresh: 1500.0
  safe_green_required: false
  green_ratio_thresh: 0.02

confidence:
  expected_area: 6000.0

comms:
  method: http
  zone_encoding: string
  udp_ip: localhost
  udp_port: 8000
  serial_port: /dev/ttyUSB0
  serial_baud: 115200
  http_url: http://100.72.60.28:8000/inputs

debug_stream:
  enabled: false
  host: 0.0.0.0
  port: 8081
  jpeg_quality: 80
