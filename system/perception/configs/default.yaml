fps: 30.0
roi_y_start: 240
alpha: 0.9
show_masks: true

camera:
  source: webcam
  webcam_index: 0
  width: 640
  height: 480
  backend: auto  # auto | gstreamer | ffmpeg
  # gstreamer_device: /dev/video0  # optional: override device for GStreamer

red1:
  lo: [0, 120, 80]
  hi: [10, 255, 255]
red2:
  lo: [170, 120, 80]
  hi: [179, 255, 255]
green:
  lo: [35, 60, 60]
  hi: [85, 255, 255]
blue:
  lo: [95, 80, 80]
  hi: [130, 255, 255]
black:
  lo: [0, 0, 0]
  hi: [179, 255, 80]
danger:
  lo: [0, 0, 0]
  hi: [179, 60, 90]

morph:
  kernel_size: 5
  open_iters: 1
  close_iters: 1

heading:
  min_area: 150.0
  use_centerline: true

hough:
  canny_threshold1: 50
  canny_threshold2: 150
  rho: 1.0
  theta_deg: 1.0
  threshold: 25
  min_line_length: 40
  max_line_gap: 20
  min_abs_slope: 0.3
  center_weight: 0.2

smoothing:
  window_size: 5
  ema_alpha_path: 0.8
  ema_alpha_error: 0.85
  max_error_step: 0.2
  freeze_on_miss_frames: 3
  segment_lock_frames: 3
  segment_switch_score_margin: 1.2
  segment_max_missed_frames: 2
  centerline_lookahead_ratio: 0.35
  centerline_ema_alpha: 0.8

zones:
  target_min_area: 300.0
  target_min_circularity: 0.6
  danger_mode: either
  danger_ratio_thresh: 0.08
  danger_area_thresh: 4000.0
  path_ratio_thresh: 0.03
  path_area_thresh: 1500.0
  safe_green_required: false
  green_ratio_thresh: 0.02

confidence:
  expected_area: 6000.0

comms:
  method: http
  zone_encoding: string
  udp_ip: localhost
  udp_port: 8000
  serial_port: /dev/ttyUSB0
  serial_baud: 115200
  http_url: http://100.72.60.28:8000/inputs
