# Docker production config: uses GStreamer for webcam capture.
# Extends defaults; override camera.backend for GStreamer.
fps: 30.0
roi_y_start: 240
alpha: 0.9
show_masks: false

camera:
  source: webcam
  webcam_index: 0
  width: 640
  height: 480
  backend: gstreamer
  gstreamer_device: /dev/video1

hough:
  canny_threshold1: 50
  canny_threshold2: 150
  rho: 1.0
  theta_deg: 1.0
  threshold: 25
  min_line_length: 40
  max_line_gap: 20
  min_abs_slope: 0.3
  center_weight: 0.2

smoothing:
  window_size: 7
  ema_alpha_path: 0.8
  ema_alpha_error: 0.85
  max_error_step: 0.2
  freeze_on_miss_frames: 3
  segment_lock_frames: 3
  segment_switch_score_margin: 1.2
  segment_max_missed_frames: 2
  centerline_lookahead_ratio: 0.35
  centerline_ema_alpha: 0.8

comms:
  method: http
  zone_encoding: string
  udp_ip: 127.0.0.1
  udp_port: 8000
  # Use localhost when state machine runs on same host (e.g. full stack + sim). Use host IP if state machine is on another machine.
  http_url: http://localhost:8000/inputs
