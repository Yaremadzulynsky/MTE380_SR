# Docker config for Raspberry Pi Camera Module 2 (libcamera / rpicam-vid).
# Use with: --config configs/docker-rpicam.yaml --source rpicam
# Requires perception image built with USE_RPICAM=1 (see Dockerfile).
fps: 60.0
roi_y_start_ratio: 0.5
alpha: 0.9
path_mask_key: red
show_masks: false

# Pi camera red can look less saturated/dimmer under indoor lighting.
# Relax HSV thresholds so red tape is still detected.
red1:
  lo: [0, 70, 40]
  hi: [15, 255, 255]
red2:
  lo: [165, 70, 40]
  hi: [179, 255, 255]

# Speed tuning for higher FPS:
# - Smaller ROI / resolution reduces per-frame pixel work.
# - Cheaper morphology reduces mask cleanup cost.
morph:
  kernel_size: 3
  open_iters: 1
  close_iters: 1

heading:
  min_area: 60.0
  use_centerline: true
  lookahead_y_frac: 0.72
  forward_bias: 1.0
  lateral_gain: 0.5
  max_lateral_abs: 0.6

camera:
  source: rpicam
  webcam_index: 0
  width: 480
  height: 320
comms:
  method: http
  zone_encoding: string
  udp_ip: 127.0.0.1
  udp_port: 8000
  http_url: http://localhost:8000/inputs
