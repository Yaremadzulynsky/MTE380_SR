# Docker config for Raspberry Pi Camera Module 2 (libcamera / rpicam-vid).
# Use with: --config configs/docker-rpicam.yaml --source rpicam
# Requires perception image built with USE_RPICAM=1 (see Dockerfile).
fps: 60.0
roi_y_start: 160
alpha: 0.9
show_masks: false

# Pi camera red can look less saturated/dimmer under indoor lighting.
# Relax HSV thresholds so red tape is still detected.
red1:
  lo: [0, 70, 40]
  hi: [15, 255, 255]
red2:
  lo: [165, 70, 40]
  hi: [179, 255, 255]

# Speed tuning for higher FPS:
# - Smaller ROI / resolution reduces per-frame pixel work.
# - Cheaper morphology reduces mask cleanup cost.
morph:
  kernel_size: 3
  open_iters: 1
  close_iters: 1

heading:
  min_area: 60.0
  use_centerline: true

hough:
  canny_threshold1: 50
  canny_threshold2: 150
  rho: 1.0
  theta_deg: 1.0
  threshold: 20
  min_line_length: 30
  max_line_gap: 25
  min_abs_slope: 0.25
  center_weight: 0.2

smoothing:
  window_size: 7
  ema_alpha_path: 0.85
  ema_alpha_error: 0.9
  max_error_step: 0.15
  freeze_on_miss_frames: 3
  segment_lock_frames: 3
  segment_switch_score_margin: 1.2
  segment_max_missed_frames: 2
  centerline_lookahead_ratio: 0.35
  centerline_ema_alpha: 0.8

camera:
  source: rpicam
  webcam_index: 0
  width: 480
  height: 320
comms:
  method: http
  zone_encoding: string
  udp_ip: 127.0.0.1
  udp_port: 8000
  http_url: http://localhost:8000/inputs
