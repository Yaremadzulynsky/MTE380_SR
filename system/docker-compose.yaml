services:
  perception:
    build:
      context: ./perception
    container_name: perception
    network_mode: host
    # For USB webcam, map the device (e.g. /dev/video0). Not needed for Pi Camera Module 2 (rpicam).
    devices:
      - "/dev/video0:/dev/video1"
    environment:
      PORT: 4000
      # host network: use localhost (Docker DNS names are not used)
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/perception/perception.log"
    # depends_on:
    #   - control-communication
    #   - state-machine

  # Pi Camera Module 2: use run_perception_rpicam.sh on the HOST (Docker libcamera doesn't see the camera).
  perception-rpicam:
    build:
      context: ./perception
      dockerfile: Dockerfile.rpicam
    container_name: perception-rpicam
    network_mode: host
    devices:
      - "/dev/media0:/dev/media0"
      - "/dev/media1:/dev/media1"
      - "/dev/media2:/dev/media2"
      - "/dev/media3:/dev/media3"
      - "/dev/dma_heap/linux,cma:/dev/dma_heap/linux,cma"
      - "/dev/dma_heap/system:/dev/dma_heap/system"

  control-communication:
    build:
      context: ./control_communication
    container_name: control-communication
    network_mode: host
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"  # Arduino Mega via USB (attach with usbipd on Windows/WSL2)
    environment:
      PORT: 5001
      SERIAL_PORT: "/dev/ttyACM0"
      SERIAL_BAUDRATE: "115200"
      LOG_PATH: "/var/log/control-communication/control-communication.log"

  control-screen:
    build:
      context: ./control_screen
    container_name: control-screen
    network_mode: host
    environment:
      PORT: 3000
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      CONTROL_COMM_P_PATH: "/pid/proportional"
      CONTROL_COMM_I_PATH: "/pid/integral"
      CONTROL_COMM_D_PATH: "/pid/derivative"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      STATE_MACHINE_LINE_FOLLOW_PID_PATH: "/line-follow-pid"
      PID_P_MIN: "-1000"
      PID_P_MAX: "1000"
      PID_I_MIN: "-1000"
      PID_I_MAX: "1000"
      PID_D_MIN: "-1000"
      PID_D_MAX: "1000"
      LOG_PATH: "/var/log/control-screen/control-screen.log"
    depends_on:
      - control-communication

  state-machine:
    build:
      context: ./state_machine
    container_name: state-machine
    network_mode: host
    environment:
      LOG_PATH: "/var/log/state-machine/state-machine.log"
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      LINE_PID_SETTINGS_PATH: "/var/log/state-machine/line-follow-pid.json"
      TICK_INTERVAL: "0.01"
      FAILED_PICKUP_LIMIT: "3"
      PORT: "8000"
    depends_on:
      - control-communication

  computer-vision:
    build:
      context: ./computer_vision
    container_name: computer-vision
    network_mode: host
    environment:
      PORT: "8100"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/computer-vision/computer-vision.log"

  # Optional: RTSP ingest + WebRTC player for Hough H.264 (--h264-rtsp-url).
  # Start: docker compose --profile mediamtx up -d mediamtx
  mediamtx:
    profiles:
      - mediamtx
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    network_mode: host
    restart: unless-stopped
