services:
  perception:
    build:
      context: ./perception
    container_name: perception
    network_mode: host
    command: ["python3", "-m", "src.main", "--mode", "production", "--config", "configs/docker-udp.yaml", "--source", "${PERCEPTION_SOURCE:-udp://0.0.0.0:5000}"]
    environment:
      PORT: 4000
      CONTROL_COMM_BASE_URL: "http://control-communication:5001"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/perception/perception.log"
    # volumes:
    #   - service-logs:/var/log
    # depends_on:
    #   - control-communication
    #   - state-machine

  perception-webcam:
    build:
      context: ./perception
    container_name: perception-webcam
    network_mode: host
    devices:
      - "${PERCEPTION_VIDEO_DEVICE:-/dev/video0}:${PERCEPTION_VIDEO_DEVICE:-/dev/video0}"
    command: ["python3", "-m", "src.main", "--mode", "production", "--config", "configs/docker-webcam.yaml", "--source", "${PERCEPTION_WEBCAM_SOURCE:-webcam}"]
    environment:
      PORT: 4000
      CONTROL_COMM_BASE_URL: "http://control-communication:5001"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/perception/perception.log"
    # volumes:
    #   - service-logs:/var/log
    # depends_on:
    #   - control-communication
    #   - state-machine

  # Pi Camera Module 2: use run_perception_rpicam.sh on the HOST (Docker libcamera doesn't see the camera).
  # perception-rpicam service kept for reference; use host script for actual Pi camera.
  perception-rpicam:
    build:
      context: ./perception
      dockerfile: Dockerfile.rpicam
    container_name: perception-rpicam
    network_mode: host
    devices:
      - "/dev/media0:/dev/media0"
      - "/dev/media1:/dev/media1"
      - "/dev/media2:/dev/media2"
      - "/dev/media3:/dev/media3"
      - "/dev/dma_heap/linux,cma:/dev/dma_heap/linux,cma"
      - "/dev/dma_heap/system:/dev/dma_heap/system"

  # perception-rpicam:
  #   build:
  #     context: ./perception
  #     dockerfile: Dockerfile.rpicam
  #   container_name: perception-rpicam
  #   network_mode: host
  #   privileged: true
  #   volumes:
  #     - /run/udev:/run/udev:ro

  control-communication:
    build:
      context: ./control_communication
    container_name: control-communication
    network_mode: host
    # devices:
    #    - "/dev/ttyACM0:/dev/ttyACM0"  # Arduino Mega via USB (attach with usbipd on Windows/WSL2)
    environment:
      PORT: 5001
      ROBOT_MOCK_CONTROL_URL: "http://localhost:8200/api/sim-control"
      SERIAL_PORT: "/dev/ttyACM0"
      SERIAL_BAUDRATE: "115200"
      SERVO_MIN_DEG: "0"
      SERVO_MAX_DEG: "90"
      SERVO_DEFAULT_DEG: "45"
      LOG_PATH: "/var/log/control-communication/control-communication.log"
    volumes:
      - metrics-pipe:/var/run/metrics
      - service-logs:/var/log

  control-screen:
    build:
      context: ./control_screen
    container_name: control-screen
    network_mode: host
    environment:
      PORT: 3000
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      CONTROL_COMM_P_PATH: "/pid/proportional"
      CONTROL_COMM_I_PATH: "/pid/integral"
      CONTROL_COMM_D_PATH: "/pid/derivative"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      SERVO_MIN_DEG: "0"
      SERVO_MAX_DEG: "90"
      PERCEPTION_BASE_URL: "http://localhost:8081"
      PERCEPTION_TUNING_PATH: "/tuning/perception"
      PID_P_MIN: "-1000"
      PID_P_MAX: "1000"
      PID_I_MIN: "-1000"
      PID_I_MAX: "1000"
      PID_D_MIN: "-1000"
      PID_D_MAX: "1000"
      LOG_PATH: "/var/log/control-screen/control-screen.log"
    volumes:
      - metrics-pipe:/var/run/metrics
      - service-logs:/var/log
    depends_on:
      - control-communication

  metrics-aggregator:
    build:
      context: ./metrics_aggregator
    container_name: metrics-aggregator
    # ports:
      # - "7001:7000"
    network_mode: host
    environment:
      PORT: 7001
      METRICS_PIPE_PATH: "/var/run/metrics/metrics.prom"
      METRICS_MAX_LINES: "2000"
      LOG_PATH: "/var/log/metrics-aggregator/metrics-aggregator.log"
    volumes:
      - metrics-pipe:/var/run/metrics
      - service-logs:/var/log

  state-machine:
    build:
      context: ./state_machine
    container_name: state-machine
    # ports:
      # - "8000:8000"
    network_mode: host
    environment:
      LOG_PATH: "/var/log/state-machine/state-machine.log"
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      SERVO_MIN_DEG: "0"
      SERVO_MAX_DEG: "90"
      SERVO_CENTER_DEG: "45"
      LINE_PID_SETTINGS_PATH: "/var/log/state-machine/line-follow-pid.json"
      TICK_INTERVAL: "0.01"
      FAILED_PICKUP_LIMIT: "3"
      PORT: "8000"
    volumes:
      - service-logs:/var/log
    # depends_on:
    #   - control-communication

  computer-vision:
    build:
      context: ./computer_vision
    container_name: computer-vision
    # ports:
    #   - "8100:8100"
    network_mode: host
    environment:
      PORT: "8100"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/computer-vision/computer-vision.log"
    volumes:
      - service-logs:/var/log
    # depends_on:
      # - state-machine

  robot-mock:
    build:
      context: ./robot_mock
    container_name: robot-mock
    # ports:
    #   - "8200:8200"
    network_mode: host
    environment:
      PORT: "8200"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      STATE_MACHINE_STATES_PATH: "/states"
      SYSTEM_POLL_INTERVAL_S: "0.1"
    # depends_on:
      # - control-communication
      # - state-machine

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    # ports:
    #   - "9090:9090"
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./metrics_aquisition/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    # ports:
    #   - "3100:3100"
    network_mode: host
    volumes:
      - loki-data:/loki

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    network_mode: host
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./metrics_aquisition/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - service-logs:/var/log:ro
    depends_on:
      - loki
      - metrics-aggregator

  grafana:
    image: grafana/grafana:10.4.2
    container_name: insights-screen
    # ports:
    #   - "3001:3000"
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "3001"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_MODE: "file"
      GF_LOG_FILE: "/var/log/insights-screen/insights-screen.log"
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - service-logs:/var/log
      - ./insights_screen/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./insights_screen/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./insights_screen/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  metrics-pipe:
  service-logs:
