services:
  perception:
    build:
      context: ./perception
    container_name: perception
    network_mode: host
    # For USB webcam, map the device (e.g. /dev/video0). Not needed for Pi Camera Module 2 (rpicam).
    devices:
      - "/dev/video0:/dev/video1"
    environment:
      PORT: 4000
      # host network: use localhost (Docker DNS names are not used)
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/perception/perception.log"
    # depends_on:
    #   - control-communication
    #   - state-machine

  # Pi Camera Module 2: use run_perception_rpicam.sh on the HOST (Docker libcamera doesn't see the camera).
  perception-rpicam:
    build:
      context: ./perception
      dockerfile: Dockerfile.rpicam
    container_name: perception-rpicam
    network_mode: host
    devices:
      - "/dev/media0:/dev/media0"
      - "/dev/media1:/dev/media1"
      - "/dev/media2:/dev/media2"
      - "/dev/media3:/dev/media3"
      - "/dev/dma_heap/linux,cma:/dev/dma_heap/linux,cma"
      - "/dev/dma_heap/system:/dev/dma_heap/system"

  control-communication:
    build:
      context: ./control_communication
    container_name: control-communication
    network_mode: host
    # devices:
    #   - "/dev/ttyACM0:/dev/ttyACM0"  # Arduino Mega via USB (attach with usbipd on Windows/WSL2)
    environment:
      PORT: 5001
      SERIAL_PORT: "/dev/ttyACM0"
      SERIAL_BAUDRATE: "115200"
      LOG_PATH: "/var/log/control-communication/control-communication.log"

  control-screen:
    build:
      context: ./control_screen
    container_name: control-screen
    network_mode: host
    # Mount this repo so Ops can find run_perception_rpicam.sh (default path is wrong inside /app-only image).
    volumes:
      - .:/workspace/system:rw
    environment:
      PORT: 3000
      PERCEPTION_RUN_SCRIPT: /workspace/system/run_perception_rpicam.sh
      PERCEPTION_RUN_CWD: /workspace/system
      PERCEPTION_LOG_FILE: /workspace/system/perception/logs/control-screen-perception.log
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      CONTROL_COMM_P_PATH: "/pid/proportional"
      CONTROL_COMM_I_PATH: "/pid/integral"
      CONTROL_COMM_D_PATH: "/pid/derivative"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      STATE_MACHINE_LINE_FOLLOW_PID_PATH: "/line-follow-pid"
      PID_P_MIN: "-1000"
      PID_P_MAX: "1000"
      PID_I_MIN: "-1000"
      PID_I_MAX: "1000"
      PID_D_MIN: "-1000"
      PID_D_MAX: "1000"
      LOG_PATH: "/var/log/control-screen/control-screen.log"
    depends_on:
      - control-communication

  state-machine:
    build:
      context: ./state_machine
    container_name: state-machine
    network_mode: host
    environment:
      LOG_PATH: "/var/log/state-machine/state-machine.log"
      CONTROL_COMM_BASE_URL: "http://localhost:5001"
      LINE_PID_SETTINGS_PATH: "/var/log/state-machine/line-follow-pid.json"
      TICK_INTERVAL: "0.01"
      FAILED_PICKUP_LIMIT: "3"
      PORT: "8000"
    depends_on:
      - control-communication

  computer-vision:
    build:
      context: ./computer_vision
    container_name: computer-vision
    network_mode: host
    environment:
      PORT: "8100"
      STATE_MACHINE_BASE_URL: "http://localhost:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/computer-vision/computer-vision.log"

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    # ports:
    #   - "9090:9090"
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./metrics_aquisition/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    # ports:
    #   - "3100:3100"
    network_mode: host
    volumes:
      - loki-data:/loki

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    network_mode: host
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./metrics_aquisition/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - service-logs:/var/log:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    container_name: insights-screen
    # ports:
    #   - "3001:3000"
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "3001"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_MODE: "file"
      GF_LOG_FILE: "/var/log/insights-screen/insights-screen.log"
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - service-logs:/var/log
      - ./insights_screen/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./insights_screen/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./insights_screen/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'

  # Optional: RTSP ingest + WebRTC player for Hough H.264 (--h264-rtsp-url).
  # Start: docker compose --profile mediamtx up -d mediamtx
  mediamtx:
    profiles:
      - mediamtx
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    network_mode: host
    restart: unless-stopped


volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  metrics-pipe:
  service-logs:
