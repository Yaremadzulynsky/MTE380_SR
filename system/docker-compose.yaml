services:
  perception:
    build:
      context: ./perception
    container_name: perception
    network_mode: host
    devices:
      - "/dev/video0:/dev/video0"
    # environment:
    #   PORT: 4000
    #   CONTROL_COMM_BASE_URL: "http://control-communication:5001"
    #   CONTROL_COMM_CONTROL_PATH: "/control"
    #   STATE_MACHINE_BASE_URL: "http://state-machine:8000"
    #   STATE_MACHINE_INPUT_PATH: "/inputs"
    #   LOG_PATH: "/var/log/perception/perception.log"
    # volumes:
    #   - service-logs:/var/log
    # depends_on:
    #   - control-communication
    #   - state-machine
  control-communication:
    build:
      context: ./control_communication
    container_name: control-communication
    network_mode: host
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
      # - "/dev/cu.usbmodem21401:/dev/cu.usbmodem21401"
    environment:
      PORT: 5001
      HARDWARE_MODE: "i2c"
      SERIAL_PORT: "/dev/cu.usbmodem21401"
      SERIAL_BAUDRATE: "115200"
      SERIAL_TIMEOUT_S: "1.0"
      SERIAL_WRITE_TIMEOUT_S: "1.0"
      PID_P_DEFAULT: "0"
      PID_I_DEFAULT: "0"
      PID_D_DEFAULT: "0"
      PID_SETTINGS_PATH: "/var/log/control-communication/pid-settings.json"
      LOG_PATH: "/var/log/control-communication/control-communication.log"
    volumes:
      - metrics-pipe:/var/run/metrics
      - service-logs:/var/log

  control-screen:
    build:
      context: ./control_screen
    container_name: control-screen
    network_mode: host
    environment:
      PORT: 3000
      CONTROL_COMM_BASE_URL: "http://control-communication:5001"
      CONTROL_COMM_P_PATH: "/pid/proportional"
      CONTROL_COMM_I_PATH: "/pid/integral"
      CONTROL_COMM_D_PATH: "/pid/derivative"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_LINE_FOLLOW_PID_PATH: "/line-follow-pid"
      PID_P_MIN: "-1000"
      PID_P_MAX: "1000"
      PID_I_MIN: "-1000"
      PID_I_MAX: "1000"
      PID_D_MIN: "-1000"
      PID_D_MAX: "1000"
      LOG_PATH: "/var/log/control-screen/control-screen.log"
    volumes:
      - metrics-pipe:/var/run/metrics
      - service-logs:/var/log
    depends_on:
      - control-communication

  metrics-aggregator:
    build:
      context: ./metrics_aggregator
    container_name: metrics-aggregator
    # ports:
      # - "7001:7000"
    network_mode: host
    environment:
      PORT: 7001
      METRICS_PIPE_PATH: "/var/run/metrics/metrics.prom"
      METRICS_MAX_LINES: "2000"
      LOG_PATH: "/var/log/metrics-aggregator/metrics-aggregator.log"
    volumes:
      - metrics-pipe:/var/run/metrics
      - service-logs:/var/log

  state-machine:
    build:
      context: ./state_machine
    container_name: state-machine
    # ports:
      # - "8000:8000"
    network_mode: host
    environment:
      LOG_PATH: "/var/log/state-machine/state-machine.log"
      CONTROL_COMM_BASE_URL: "http://control-communication:5001"
      LINE_PID_SETTINGS_PATH: "/var/log/state-machine/line-follow-pid.json"
      TICK_INTERVAL: "0.01"
      FAILED_PICKUP_LIMIT: "3"
      PORT: "8000"
    volumes:
      - service-logs:/var/log
    depends_on:
      - control-communication

  computer-vision:
    build:
      context: ./computer_vision
    container_name: computer-vision
    # ports:
    #   - "8100:8100"
    network_mode: host
    environment:
      PORT: "8100"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      LOG_PATH: "/var/log/computer-vision/computer-vision.log"
    volumes:
      - service-logs:/var/log
    # depends_on:
      # - state-machine

  robot-mock:
    build:
      context: ./robot_mock
    container_name: robot-mock
    # ports:
    #   - "8200:8200"
    network_mode: host
    environment:
      PORT: "8200"
      CONTROL_COMM_BASE_URL: "http://control-communication:5001"
      CONTROL_COMM_CONTROL_PATH: "/control"
      STATE_MACHINE_BASE_URL: "http://state-machine:8000"
      STATE_MACHINE_INPUT_PATH: "/inputs"
      STATE_MACHINE_STATES_PATH: "/states"
      SYSTEM_POLL_INTERVAL_S: "0.1"
    # depends_on:
      # - control-communication
      # - state-machine

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    # ports:
    #   - "9090:9090"
    network_mode: host
    volumes:
      - ./metrics_aquisition/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    # ports:
    #   - "3100:3100"
    network_mode: host
    volumes:
      - loki-data:/loki

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    network_mode: host
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./metrics_aquisition/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - service-logs:/var/log:ro
    depends_on:
      - loki
      - metrics-aggregator

  grafana:
    image: grafana/grafana:10.4.2
    container_name: insights-screen
    # ports:
    #   - "3001:3000"
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_MODE: "file"
      GF_LOG_FILE: "/var/log/insights-screen/insights-screen.log"
    volumes:
      - grafana-data:/var/lib/grafana
      - service-logs:/var/log
      - ./insights_screen/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./insights_screen/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./insights_screen/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  metrics-pipe:
  service-logs:
