global:
  scrape_interval: 50ms
  evaluation_interval: 50ms

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: control-communication
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:5001"]

  - job_name: metrics-aggregator
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:7001"]
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
