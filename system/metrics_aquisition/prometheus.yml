global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: prometheus-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9101"]

  - job_name: metrics-aggregator
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:7001"]
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
